<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVALON | CHAR SELECT</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon/site.webmanifest" />
  </head>

  <body>
    <div class="wrapper">
      <div class="char-card"></div>
      <h1 class="naslov">AVA<br />LON</h1>
      <section class="char-section">
        <div class="response">
          <div class="svg"></div>
          <div class="img">
            <div class="img-div">
              <p>GLAS #1</p>
            </div>
            <div class="img-text">
              <h1 class="selecth2">Glasaj</h1>
            </div>
          </div>
        </div>
        <div class="buttons">
          <button class="choose-but">YES</button>
          <button class="next-but">NO</button>
        </div>
      </section>
    </div>
    <script type="text/javascript" src="js/voting.js"></script>
  </body>
</html>
